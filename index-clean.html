<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXÉ QUE TRANSFORMA VIDAS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="#inicio" class="nav-link active">INICIO</a></li>
                <li><a href="#trabalhos" class="nav-link">TRABALHOS</a></li>
                <li><a href="#rituais" class="nav-link">RITUAIS</a></li>
                <li><a href="#funciona" class="nav-link">FUNCIONA</a></li>
                <li class="nav-auth-buttons">
                    <a href="cadastro.html" class="nav-btn nav-btn-primary">
                        <i class="fas fa-user-plus"></i>
                        <span>Cadastrar</span>
                    </a>
                    <a href="cliente.html" class="nav-btn nav-btn-secondary">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Entrar</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="inicio">
        <!-- Top corner roses -->
        <div class="top-roses">
            <img src="rosa esquerda.png" alt="Rosa esquerda" class="rosa-left">
            <img src="rosa direita.png" alt="Rosa direita" class="rosa-right">
        </div>
        
        <div class="hero-container">
            <div class="hero-content">
                <div class="hero-text">
                    <h1 class="hero-title">
                        <span class="word">mae</span>
                        <span class="word">grazi</span>
                        <span class="word">baixa renda</span>
                    </h1>
                </div>
                
                <div class="hero-visual">
                    <div class="main-figure">
                        <img src="mulher.png" alt="Figura principal" class="main-image">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- TRABALHOS Section -->
    <section class="trabalhos" id="trabalhos">
        <!-- Top corner roses -->
        <div class="top-roses-trabalhos">
            <img src="rosa esquerda.png" alt="Rosa esquerda" class="rosa-left-trabalhos">
            <img src="rosa direita.png" alt="Rosa direita" class="rosa-right-trabalhos">
        </div>
        
        <div class="trabalhos-container">
            <h2 class="trabalhos-title">TRABALHOS</h2>
            
            <div class="cards-grid">
                <!-- Cards will be dynamically loaded here -->
            </div>
        </div>

        <!-- Bottom candles -->
        <div class="bottom-candles-trabalhos">
            <img src="vela preta.png" alt="Vela preta" class="vela-preta-bottom-trabalhos">
            <img src="vela vermelha.png" alt="Vela vermelha" class="vela-vermelha-bottom-trabalhos">
        </div>
    </section>

    <!-- RITUAIS Section -->
    <section class="rituais" id="rituais">
        <!-- Top corner roses -->
        <div class="top-roses-rituais">
            <img src="rosa esquerda.png" alt="Rosa esquerda" class="rosa-left-rituais">
            <img src="rosa direita.png" alt="Rosa direita" class="rosa-right-rituais">
        </div>
        
        <div class="rituais-container">
            <h2 class="rituais-title">RITUAIS</h2>
            
            <div class="cards-grid-rituais">
                <!-- Cards will be dynamically loaded here -->
            </div>
        </div>

        <!-- Bottom candles -->
        <div class="bottom-candles-rituais">
            <img src="vela preta.png" alt="Vela preta" class="vela-preta-bottom-rituais">
            <img src="vela vermelha.png" alt="Vela vermelha" class="vela-vermelha-bottom-rituais">
        </div>
    </section>

    <!-- FUNCIONA Section -->
    <section class="funciona" id="funciona">
        <div class="funciona-container">
            <h2 class="funciona-title">COMO FUNCIONA</h2>
            
            <div class="funciona-content">
                <div class="funciona-text">
                    <h3>Transforme sua vida com nossos serviços espirituais</h3>
                    <p>Oferecemos trabalhos e rituais personalizados para atender às suas necessidades espirituais.</p>
                </div>
            </div>
        </div>
    </section>

    <script src="main.js"></script>
    <script src="services.js"></script>
</body>
</html>
